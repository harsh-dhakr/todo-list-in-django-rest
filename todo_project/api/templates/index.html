<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo List</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7fb;
      --surface: #ffffff;
      --surface-soft: #eef3f1;
      --text: #18212f;
      --muted: #667085;
      --line: #d9e0e7;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --success: #16875a;
      --danger: #c2413a;
      --warning: #b7791f;
      --shadow: 0 20px 45px rgba(15, 23, 42, 0.1);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(135deg, rgba(37, 99, 235, 0.08), transparent 34%),
        linear-gradient(315deg, rgba(22, 135, 90, 0.1), transparent 30%),
        var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app-shell {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 40px 0;
    }

    .topbar {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 24px;
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--primary);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(32px, 5vw, 56px);
      line-height: 1;
      letter-spacing: 0;
    }

    .subhead {
      max-width: 560px;
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.6;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 38px;
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.82);
      color: var(--muted);
      font-size: 14px;
      white-space: nowrap;
    }

    .status-dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: var(--warning);
    }

    .status-dot.is-online {
      background: var(--success);
    }

    .dashboard {
      display: grid;
      grid-template-columns: minmax(300px, 0.72fr) minmax(0, 1.28fr);
      gap: 20px;
      align-items: start;
    }

    .panel {
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(217, 224, 231, 0.8);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .composer {
      padding: 24px;
    }

    .panel-title {
      margin: 0 0 16px;
      font-size: 20px;
      line-height: 1.25;
    }

    .field-group {
      display: grid;
      gap: 12px;
    }

    .input-wrap {
      display: grid;
      gap: 7px;
    }

    label {
      color: #344054;
      font-size: 13px;
      font-weight: 700;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fbfcfe;
      color: var(--text);
      outline: none;
      padding: 12px 13px;
      transition: border-color 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }

    textarea {
      min-height: 108px;
      resize: vertical;
    }

    input:focus,
    textarea:focus {
      border-color: var(--primary);
      background: var(--surface);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.13);
    }

    .primary-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      width: 100%;
      margin-top: 16px;
      border-radius: var(--radius);
      background: var(--primary);
      color: #fff;
      font-weight: 800;
      transition: background 160ms ease, transform 160ms ease;
    }

    .primary-btn:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 18px;
    }

    .stat {
      min-height: 86px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface-soft);
    }

    .stat strong {
      display: block;
      margin-bottom: 4px;
      font-size: 26px;
      line-height: 1;
    }

    .stat span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .task-panel {
      overflow: hidden;
    }

    .task-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
    }

    .filters {
      display: inline-grid;
      grid-template-columns: repeat(3, 1fr);
      min-width: 282px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #f8fafc;
    }

    .filter-btn {
      min-height: 38px;
      padding: 0 12px;
      background: transparent;
      color: var(--muted);
      font-size: 14px;
      font-weight: 800;
    }

    .filter-btn.is-active {
      background: var(--text);
      color: #fff;
    }

    .task-count {
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
    }

    .task-list {
      display: grid;
      gap: 0;
      min-height: 360px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .task-card {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.72);
    }

    .task-card:last-child {
      border-bottom: 0;
    }

    .task-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface);
      color: transparent;
      font-weight: 900;
      transition: background 160ms ease, border-color 160ms ease, color 160ms ease;
    }

    .task-card.is-complete .task-toggle {
      border-color: var(--success);
      background: var(--success);
      color: #fff;
    }

    .task-content {
      min-width: 0;
    }

    .task-title {
      margin: 0;
      overflow-wrap: anywhere;
      font-size: 16px;
      font-weight: 800;
      line-height: 1.35;
    }

    .task-desc {
      margin: 5px 0 0;
      color: var(--muted);
      overflow-wrap: anywhere;
      font-size: 14px;
      line-height: 1.5;
    }

    .task-card.is-complete .task-title,
    .task-card.is-complete .task-desc {
      color: #8a95a5;
      text-decoration: line-through;
    }

    .delete-btn {
      min-height: 36px;
      padding: 0 12px;
      border: 1px solid rgba(194, 65, 58, 0.24);
      border-radius: var(--radius);
      background: #fff3f2;
      color: var(--danger);
      font-size: 13px;
      font-weight: 800;
    }

    .delete-btn:hover {
      background: #fee4e2;
    }

    .empty-state,
    .loading-state,
    .error-state {
      display: grid;
      place-items: center;
      min-height: 360px;
      padding: 32px;
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
    }

    .error-state {
      color: var(--danger);
      font-weight: 800;
    }

    @media (max-width: 840px) {
      .app-shell {
        width: min(100% - 24px, 680px);
        padding: 24px 0;
      }

      .topbar,
      .dashboard,
      .task-toolbar {
        grid-template-columns: 1fr;
      }

      .topbar,
      .task-toolbar {
        align-items: stretch;
      }

      .dashboard {
        display: grid;
      }

      .filters {
        min-width: 0;
        width: 100%;
      }
    }

    @media (max-width: 560px) {
      .composer,
      .task-toolbar,
      .task-card {
        padding: 16px;
      }

      .stats {
        grid-template-columns: 1fr;
      }

      .task-card {
        grid-template-columns: auto minmax(0, 1fr);
      }

      .delete-btn {
        grid-column: 2;
        width: max-content;
      }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Django REST Todo</p>
        <h1>Today&apos;s Tasks</h1>
        <p class="subhead">Capture work, mark it complete, and keep the API-backed list tidy from one focused screen.</p>
      </div>
      <div class="status-pill" aria-live="polite">
        <span id="statusDot" class="status-dot"></span>
        <span id="apiStatus">Connecting</span>
      </div>
    </header>

    <section class="dashboard" aria-label="Todo workspace">
      <aside class="panel composer">
        <h2 class="panel-title">New Task</h2>
        <form id="taskForm">
          <div class="field-group">
            <div class="input-wrap">
              <label for="title">Title</label>
              <input id="title" name="title" type="text" maxlength="200" placeholder="Prepare project notes" required>
            </div>
            <div class="input-wrap">
              <label for="desc">Description</label>
              <textarea id="desc" name="description" placeholder="Add context, links, or reminders"></textarea>
            </div>
          </div>
          <button class="primary-btn" type="submit">Add Task</button>
        </form>

        <div class="stats" aria-label="Task stats">
          <div class="stat">
            <strong id="totalCount">0</strong>
            <span>Total</span>
          </div>
          <div class="stat">
            <strong id="openCount">0</strong>
            <span>Open</span>
          </div>
          <div class="stat">
            <strong id="doneCount">0</strong>
            <span>Done</span>
          </div>
        </div>
      </aside>

      <section class="panel task-panel" aria-label="Task list">
        <div class="task-toolbar">
          <div class="filters" role="tablist" aria-label="Task filters">
            <button class="filter-btn is-active" type="button" data-filter="all">All</button>
            <button class="filter-btn" type="button" data-filter="open">Open</button>
            <button class="filter-btn" type="button" data-filter="done">Done</button>
          </div>
          <span id="visibleCount" class="task-count">0 tasks</span>
        </div>
        <ul id="tasks" class="task-list" aria-live="polite">
          <li class="loading-state">Loading tasks...</li>
        </ul>
      </section>
    </section>
  </main>

  <script>
    const API = "/api/tasks/";
    const state = {
      tasks: [],
      filter: "all",
    };

    const taskForm = document.getElementById("taskForm");
    const taskList = document.getElementById("tasks");
    const apiStatus = document.getElementById("apiStatus");
    const statusDot = document.getElementById("statusDot");
    const filterButtons = document.querySelectorAll(".filter-btn");

    function setApiStatus(message, online) {
      apiStatus.textContent = message;
      statusDot.classList.toggle("is-online", online);
    }

    function getVisibleTasks() {
      if (state.filter === "open") {
        return state.tasks.filter((task) => !task.completed);
      }
      if (state.filter === "done") {
        return state.tasks.filter((task) => task.completed);
      }
      return state.tasks;
    }

    function updateStats() {
      const total = state.tasks.length;
      const done = state.tasks.filter((task) => task.completed).length;
      const open = total - done;
      const visible = getVisibleTasks().length;

      document.getElementById("totalCount").textContent = total;
      document.getElementById("openCount").textContent = open;
      document.getElementById("doneCount").textContent = done;
      document.getElementById("visibleCount").textContent = `${visible} ${visible === 1 ? "task" : "tasks"}`;
    }

    function renderEmptyState() {
      const item = document.createElement("li");
      item.className = "empty-state";
      item.textContent = state.tasks.length ? "No tasks match this filter." : "No tasks yet. Add your first task from the form.";
      taskList.appendChild(item);
    }

    function renderTask(task) {
      const item = document.createElement("li");
      item.className = "task-card";
      item.classList.toggle("is-complete", task.completed);

      const toggleButton = document.createElement("button");
      toggleButton.className = "task-toggle";
      toggleButton.type = "button";
      toggleButton.textContent = "✓";
      toggleButton.setAttribute("aria-label", task.completed ? "Mark task as open" : "Mark task as complete");
      toggleButton.addEventListener("click", () => toggleTask(task.id, task.completed));

      const content = document.createElement("div");
      content.className = "task-content";

      const title = document.createElement("p");
      title.className = "task-title";
      title.textContent = task.title;
      content.appendChild(title);

      if (task.description) {
        const description = document.createElement("p");
        description.className = "task-desc";
        description.textContent = task.description;
        content.appendChild(description);
      }

      const deleteButton = document.createElement("button");
      deleteButton.className = "delete-btn";
      deleteButton.type = "button";
      deleteButton.textContent = "Delete";
      deleteButton.addEventListener("click", () => removeTask(task.id));

      item.append(toggleButton, content, deleteButton);
      taskList.appendChild(item);
    }

    function renderTasks() {
      taskList.replaceChildren();
      const visibleTasks = getVisibleTasks();

      if (!visibleTasks.length) {
        renderEmptyState();
      } else {
        visibleTasks.forEach(renderTask);
      }

      updateStats();
    }

    async function fetchTasks() {
      try {
        setApiStatus("Connecting", false);
        const response = await fetch(API);
        if (!response.ok) {
          throw new Error("Could not load tasks");
        }
        state.tasks = await response.json();
        setApiStatus("API Online", true);
        renderTasks();
      } catch (error) {
        taskList.replaceChildren();
        const item = document.createElement("li");
        item.className = "error-state";
        item.textContent = "Task API is not reachable. Start the Django server and refresh.";
        taskList.appendChild(item);
        setApiStatus("API Offline", false);
        updateStats();
      }
    }

    async function addTask(event) {
      event.preventDefault();
      const formData = new FormData(taskForm);
      const title = formData.get("title").trim();
      const description = formData.get("description").trim();

      if (!title) {
        return;
      }

      await fetch(API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ title, description, completed: false }),
      });

      taskForm.reset();
      document.getElementById("title").focus();
      fetchTasks();
    }

    async function toggleTask(id, completed) {
      await fetch(`${API}${id}/`, {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ completed: !completed }),
      });
      fetchTasks();
    }

    async function removeTask(id) {
      await fetch(`${API}${id}/`, { method: "DELETE" });
      fetchTasks();
    }

    taskForm.addEventListener("submit", addTask);

    filterButtons.forEach((button) => {
      button.addEventListener("click", () => {
        state.filter = button.dataset.filter;
        filterButtons.forEach((item) => item.classList.toggle("is-active", item === button));
        renderTasks();
      });
    });

    fetchTasks();
  </script>
</body>
</html>
